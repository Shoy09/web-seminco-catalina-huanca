<div class="contenedor-rendimiento">

  <!-- TARJETA PRINCIPAL -->
  <div class="card-principal" [attr.data-tooltip]="getTooltipText(tarjetas[0])">
    <div class="valor-principal">
      {{ tarjetas[0]?.valor }}
    </div>
    <div class="titulo-principal">
      {{ tarjetas[0]?.titulo }}
    </div>
    <div class="decoracion-barra"></div>
  </div>

  <!-- INDICADORES POR EQUIPO -->
  <div
    class="gauge-card"
    *ngFor="let item of tarjetas.slice(1)"
    [attr.data-tooltip]="getTooltipText(item)"
  >
    <div class="gauge-title">
      {{ item.titulo }}
    </div>
    <div class="gauge-container">
      <div
        class="gauge"
        [style.--value]="item.porcentaje"
        [style.--color]="item.color"
      >
        <div class="gauge-center">
          {{ item.valor | number:'1.0-0' }}
        </div>
      </div>
    </div>
    <div class="gauge-subinfo">
      {{ item.valor | number:'1.0-0' }}
    </div>
  </div>

</div>
