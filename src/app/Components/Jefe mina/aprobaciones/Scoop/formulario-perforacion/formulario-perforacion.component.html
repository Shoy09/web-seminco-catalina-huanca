<div class="modal-overlay perf-overlay" *ngIf="visible">
  <div class="modal-card perf-card">
    <div class="perf-header">
      <div class="header-left">
        <i class="far fa-file-alt header-icon"></i>
        <h1 class="header-title">Formulario de Operación</h1>
      </div>
      <div class="header-right">
        <span class="editable-badge">• EDITABLE</span>
        <span class="estado-badge" [class]="estado.toLowerCase()">
          {{ estado }}
        </span>
      </div>
    </div>

    <div class="validation-error" *ngIf="formularioInvalido">
      <i class="fas fa-exclamation-triangle"></i>
      Complete los campos obligatorios (*).
    </div>

    <form class="perf-form">
      <!-- SECCIÓN UBICACIÓN DE INICIO -->
      <fieldset class="form-section">
        <legend class="section-legend">
          <i class="fas fa-map-marker-alt icon"></i> Ubicación de Inicio
          <span class="required-star" *ngIf="mostrarCamposCompletos">*</span>
        </legend>
        <div class="row-inputs">
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-warehouse label-icon"></i>
              Labor <span class="required-star" *ngIf="mostrarCamposCompletos">*</span>
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Ej: 7022"
              [(ngModel)]="datosPerforacion.labor_inicio"
              name="labor_inicio"
              list="laboresList"
            />
            <datalist id="laboresList">
              <option *ngFor="let l of labores" [value]="l"></option>
            </datalist>
          </div>
        </div>
      </fieldset>

            <!-- SECCIÓN UBICACIÓN DESTINO -->
      <fieldset class="form-section" *ngIf="mostrarCamposCompletos">
        <legend class="section-legend">
          <i class="fas fa-location-dot icon"></i> Ubicación de Destino
          <span class="required-star">*</span>
        </legend>

        <div class="row-inputs">
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-truck label-icon"></i>
              Destino
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Ej: Caja negra, VOLQUETE"
              [(ngModel)]="datosPerforacion.ubicacion_destino"
              name="ubicacion_destino"
              list="ubicacionesDestinoList"
            />
            <datalist id="ubicacionesDestinoList">
              <option *ngFor="let u of ubicacionesDestino" [value]="u"></option>
            </datalist>
          </div>
        </div>

        <!-- Número de Volquete (solo si destino es VOLQUETE) -->
        <div class="row-inputs" *ngIf="datosPerforacion.ubicacion_destino === 'VOLQUETE'">
          <div class="input-field">
            <label class="field-label">
              <i class="fas fa-hashtag label-icon"></i>
              N° Volquete
            </label>
            <input
              type="text"
              class="perf-input"
              placeholder="Número de volquete"
              [(ngModel)]="datosPerforacion.numero_volquete"
              name="numero_volquete"
              list="volquetesList"
            />
            <datalist id="volquetesList">
              <option *ngFor="let v of volquetes" [value]="v"></option>
            </datalist>
          </div>
        </div>
      </fieldset>


      <!-- SECCIÓN DATOS DE OPERACIÓN -->
<!-- SECCIÓN DATOS DE OPERACIÓN -->
<fieldset class="form-section" *ngIf="mostrarCamposCompletos">
  <legend class="section-legend">
    <i class="fas fa-chart-line icon"></i> Datos de Operación
  </legend>

  <!-- N° Cucharas y Tipo de Material en la misma fila -->
  <div class="row-inputs">
    <div class="input-field">
      <label class="field-label">
        <i class="fas fa-cubes label-icon"></i>
        N° Cucharas <span class="required-star">*</span>
      </label>
      <input
        type="number"
        class="perf-input"
        placeholder="Cantidad de cucharas"
        [(ngModel)]="datosPerforacion.n_cucharas"
        name="n_cucharas"
      />
    </div>

    <div class="input-field">
      <label class="field-label">
        <i class="fas fa-gem label-icon"></i>
        Tipo de Material
      </label>
      <select 
        class="perf-input"
        [(ngModel)]="datosPerforacion.material"
        name="material"
        (change)="resetMaterialCounters(datosPerforacion.material)">
        <option value="">Seleccione un material</option>
        <option *ngFor="let m of materiales" [value]="m">{{ m }}</option>
      </select>
    </div>
  </div>

</fieldset>


      <!-- SECCIÓN OBSERVACIONES -->
      <fieldset class="form-section">
        <legend class="section-legend">
          <i class="fas fa-comment icon"></i> Observaciones
        </legend>

        <div class="input-field textarea-field">
          <label class="field-label">
            <i class="fas fa-pen label-icon"></i>
            Observaciones adicionales
          </label>
          <textarea
            class="perf-input perf-textarea"
            rows="3"
            placeholder="Ingrese observaciones importantes sobre la operación..."
            [(ngModel)]="datosPerforacion.observaciones"
            name="observaciones"
          ></textarea>
        </div>
      </fieldset>

      <div class="perf-footer-actions">
        <button
          type="button"
          class="btn-cancelar"
          (click)="cerrarFormPerforacion()"
        >
          <i class="fas fa-times"></i> Cancelar
        </button>
        <button
          type="button"
          class="btn-guardar"
          (click)="guardarPerforacion()"
        >
          <i class="fas fa-save"></i> Guardar cambios
        </button>
      </div>
    </form>
  </div>
</div>
